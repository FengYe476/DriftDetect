# Month 8 controlled anchor-only Adaptive-SMAD configuration.
#
# This run keeps transition damping disabled (smad.eta=0.0) while enabling the
# SMAD anchor loss and periodic true-vs-imagined drift basis re-estimation.

dreamer_configs:
  - dmc_proprio

task: dmc_cheetah_run
total_steps: 500000
seed: 42

dreamer:
  batch_size: 32
  envs: 8
  compile: false

smad:
  eta: 0.0
  rank: 10
  basis_type: U_drift
  initial_basis_path: results/smad/U_drift_cheetah_r10.npy
  anchor:
    enabled: true
    beta: 0.1
    anchor_points: [5, 10, 15]
    activation_step: 0

adaptive:
  re_est_freq: 50000
  n_rollouts: 10
  imagination_start: 50
  horizon: 200

schedule:
  s0: 50000
  s1: 100000

checkpoint:
  save_freq: 5000
  save_U_history: true

monitor:
  log_overlap_prev: true
  log_overlap_baseline: true
  log_j_slow: true
  log_reest_time: true
