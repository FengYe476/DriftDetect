# Month 8 controlled zero-damping Adaptive-SMAD configuration.
#
# Important: scripts/train_adaptive_smad.py currently supports adaptive
# re-estimation and SMAD damping, but it does not wire compute_anchor_loss into
# the Dreamer training objective. With smad.eta=0.0 this run disables damping
# while preserving periodic true-vs-imagined drift basis re-estimation and
# checkpointing of current_U.

dreamer_configs:
  - dmc_proprio

task: dmc_cheetah_run
total_steps: 500000
seed: 42

dreamer:
  batch_size: 32
  envs: 8

smad:
  eta: 0.0
  rank: 10
  basis_type: U_drift
  initial_basis_path: results/smad/U_drift_cheetah_r10.npy

adaptive:
  re_est_freq: 50000
  n_rollouts: 10
  imagination_start: 50
  horizon: 200

schedule:
  s0: 50000
  s1: 100000

checkpoint:
  save_freq: 5000
  save_U_history: true

monitor:
  log_overlap_prev: true
  log_overlap_baseline: true
  log_j_slow: true
  log_reest_time: true
